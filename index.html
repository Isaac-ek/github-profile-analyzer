<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">Profile intelligence</p>
      <h1>GitHub Profile Analyzer</h1>
      <p class="hero-copy">
        Explore a developer's profile, strongest repositories, language mix, and recent public activity in one clean view.
      </p>
      <div class="search-panel">
        <label class="sr-only" for="username">GitHub username</label>
        <input type="text" id="username" placeholder="Enter a GitHub username" autocomplete="off">
        <button id="analyze-btn" type="button">Analyze Profile</button>
      </div>
      <p id="helper-text" class="helper-text">Try `torvalds`, `gaearon`, or your own username.</p>
    </section>

    <section class="content">
      <div id="loading" class="status-card is-hidden" aria-live="polite">Fetching GitHub data...</div>
      <div id="error-message" class="status-card error is-hidden" aria-live="assertive"></div>
      <div id="results" class="results" aria-live="polite"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
